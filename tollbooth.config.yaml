gateway:
  port: 3000

wallets:
  base-sepolia: "${WALLET_ADDRESS}"

accepts:
  - network: base-sepolia
    asset: USDC

upstreams:
  blog:
    url: "http://localhost:4000"

routes:
  # Homepage — free
  "GET /":
    upstream: blog
    free: true

  # Article metadata — free (used by the pricing function)
  "GET /articles/*/meta":
    upstream: blog
    free: true

  # Article previews — free
  "GET /articles/*/preview":
    upstream: blog
    free: true

  # Full articles — dynamic per-article pricing
  # Each author sets their price in the article's frontmatter.
  # Tollbooth calls the pricing function at request time.
  "GET /articles/*":
    upstream: blog
    price:
      fn: "./pricing/article-price.ts"
